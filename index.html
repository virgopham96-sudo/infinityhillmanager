<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Infinity Hill Manager</title>
    <link rel="icon" type="image/png" href="https://img.upanhnhanh.com/838ca16fbbf10cadcb31c34093da480d" />
    <script>
      try {
        let target = window;
        let desc = Object.getOwnPropertyDescriptor(target, 'fetch');
        if (!desc && typeof Window !== 'undefined') {
          target = Window.prototype;
          desc = Object.getOwnPropertyDescriptor(target, 'fetch');
        }
        if (desc && desc.get && !desc.set) {
          Object.defineProperty(target, 'fetch', {
            configurable: true,
            enumerable: desc.enumerable,
            get: desc.get,
            set: function(val) {
              console.warn("Caught rogue fetch assignment:", val);
            }
          });
        }
      } catch(e) {
        console.error("fetch polyfill fix failed", e);
      }
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
